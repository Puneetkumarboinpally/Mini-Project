<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Character Counter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Smart Character Counter</h1>
      <textarea
        class="text-input"
        maxlength="200"
        placeholder="Enter your text here...."
      ></textarea>

      <div class="count">
        <p class="char-count">Total Characters: 0</p>
        <p class="word-count">Word count: 0</p>
      </div>
      <button type="submit">Submit</button>
      <p class="warning"></p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
